# ============================================================================
# EventEase — Render Blueprint Configuration
# ============================================================================
# This file enables "Infrastructure as Code" deployment.
# 
# How to use:
#   1. Push this file to your GitHub repository
#   2. In Render Dashboard, click "New +" → "Blueprint"
#   3. Select your repository → Render auto-creates the Web Service
#   4. Fill in the empty env vars below in Render Dashboard
#
# Docs: https://render.com/docs/blueprint-spec
# ============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Web Service — EventEase Main App
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: eventease
    env: node
    region: oregon            # Options: oregon, frankfurt, ohio, singapore
    plan: free                # Options: free, starter, pro, pro_plus, etc.
    branch: main              # Git branch to deploy from
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    numInstances: 1
    autoDeploy: true          # Auto-deploy on every push to branch

    envVars:
      # ── MongoDB ──────────────────────────────────────────────────────
      - key: MONGO_URI
        sync: false
        # ⚠️  Required: Paste your MongoDB Atlas connection string here
        #     Example: mongodb+srv://eventeaseUser:<password>@cluster0.xxxxx.mongodb.net/eventease?retryWrites=true&w=majority

      # ── Resend (Email) ───────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
        # ⚠️  Required: Paste your Resend API key here
        #     Starts with "re_..."

      # ── Admin Credentials ────────────────────────────────────────────
      - key: ADMIN_EMAIL
        sync: false
        # ⚠️  Required: Admin login email

      - key: ADMIN_PASSWORD
        sync: false
        # ⚠️  Required: Admin login password (use a strong, unique one)

      # ── Session ──────────────────────────────────────────────────────
      - key: SESSION_SECRET
        sync: false
        # ⚠️  Required: Random string, min 32 characters
        #     Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

      # ── Node Environment ─────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      # ── Port (Render injects this, but we set a fallback) ────────────
      - key: PORT
        value: "8080"

# ───────────────────────────────────────────────────────────────────────────
